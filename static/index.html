<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script>
    (() => {
      try {
        const saved = localStorage.getItem("embedding-lab-theme");
        const systemDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        document.documentElement.dataset.theme = saved || (systemDark ? "dark" : "light");
      } catch (_) {
        document.documentElement.dataset.theme = "light";
      }
    })();
  </script>
  <link rel="stylesheet" href="/static/style.css" />
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
</head>
<body>
  <main id="app">
    <section id="controls">
      <div id="add-row">
        <input id="word-input" type="text" placeholder="word or phrase" autocomplete="off" />
        <button id="add-btn" class="btn btn-add">Add</button>
      </div>

      <table id="word-table"><tbody id="word-rows"></tbody></table>

      <div id="advanced-options">
        <div id="advanced-panel" aria-hidden="true">
          <div class="advanced-panel-content">
            <div id="options">
              <div class="opt-group">
                <div class="opt-title">Dim. reduction</div>
                <div class="toggle-group" id="method-toggle">
                  <button class="btn btn-method active" data-method="pca">PCA</button>
                  <button class="btn btn-method" data-method="umap" disabled>UMAP</button>
                </div>
              </div>
              <label class="check">
                <input type="checkbox" id="normalize-check" />
                <span>normalize</span>
              </label>
              <label class="check">
                <input type="checkbox" id="labels-check" checked />
                <span>show graph labels</span>
              </label>
            </div>

            <div class="opt-group" id="model-group">
              <div class="opt-title">Embedding model</div>
              <select id="model-select"></select>
            </div>
          </div>
        </div>
        <button
          id="advanced-toggle"
          class="btn btn-advanced"
          type="button"
          aria-controls="advanced-panel"
          aria-expanded="false"
        >
          <span id="advanced-toggle-label">Advanced options</span>
          <span class="advanced-chevron" aria-hidden="true">▲</span>
        </button>
      </div>

      <button id="embed-btn" class="btn btn-embed">Embed</button>
      <div id="cost"><span class="cost-label">Total cost:</span> <span id="cost-value">$0.00</span></div>
      <div id="status"></div>
    </section>

    <section id="workspace" class="obs-hidden">
      <div id="view">
        <div id="plot-shell">
          <div id="tabs">
            <button class="tab" data-view="graph" disabled>Semantic Space</button>
            <button class="tab" data-view="heatmap" disabled>Cosine Similarity</button>
          </div>
          <div id="dim-bar" class="hidden">
            <div class="toggle-group" id="dim-toggle">
              <button class="btn btn-dim" data-dim="2">2D</button>
              <button class="btn btn-dim active" data-dim="3">3D</button>
              <button class="btn btn-dim" data-dim="4">4D</button>
            </div>
          </div>
          <div id="views">
            <div id="graph" class="view-pane"></div>
            <div id="heatmap" class="view-pane hidden"></div>
            <div id="empty-hint">Use the system on the left to embed text.</div>
          </div>
        </div>
      </div>
      <button
        id="obs-toggle"
        type="button"
        aria-controls="observations"
        aria-expanded="false"
        aria-label="Show observations"
        title="Show observations"
      >
        <span class="obs-toggle-label">Observations</span>
        <span class="obs-toggle-arrow" aria-hidden="true">◀</span>
      </button>
      <aside id="observations">
        <div id="obs-resize-handle" aria-hidden="true"></div>
        <div class="obs-header">Observations</div>
        <div id="obs-list"></div>
      </aside>
    </section>
  </main>

  <div id="overlay" hidden>
    <div class="overlay-box">
      <div id="overlay-text">Embedding…</div>
      <div class="loadbar"><div class="loadbar-fill"></div></div>
    </div>
  </div>

  <dialog id="funds-modal">
    <p id="funds-msg">No funds left for embedding, I will add more soon!</p>
    <span class="donate-btn" aria-disabled="true">Consider donating</span>
    <button id="funds-close" class="btn">Close</button>
  </dialog>

  <div id="utility-links">
    <button id="theme-toggle" type="button" role="switch" aria-checked="false" aria-label="Use dark mode" title="Use dark mode">
      <span class="theme-selector" aria-hidden="true"></span>
      <span class="theme-option theme-option-light" data-theme="light" aria-hidden="true">
        <img src="/static/icons/sun.svg" alt="" />
      </span>
      <span class="theme-option theme-option-dark" data-theme="dark" aria-hidden="true">
        <img src="/static/icons/moon.svg" alt="" />
      </span>
    </button>
    <a id="gh-link" class="utility-icon" href="https://github.com/Franri3008" target="_blank" rel="noopener" title="GitHub" aria-label="GitHub">
      <img src="/static/icons/github.svg" alt="" aria-hidden="true" />
    </a>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
